<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piping Material Monitoring — Salak Unit 7</title>
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --parchment: #f5f4ed;
  --ink: #1B365D;
  --ink-light: #2a4a7a;
  --olive: #6b6a5e;
  --warm-gray: #a09f94;
  --cream: #eae9e0;
  --card-bg: #faf9f4;
  --red: #b33a3a;
  --red-bg: #fdf2f2;
  --amber: #a06b1b;
  --amber-bg: #fef9ed;
  --green: #2d6a4f;
  --green-bg: #f0faf5;
  --blue-tag: #E4ECF5;
  --serif: Charter, Georgia, Palatino, "Times New Roman", serif;
  --sans: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
  --shadow-whisper: 0 2px 16px rgba(0,0,0,0.04);
  --shadow-card: 0 1px 3px rgba(0,0,0,0.06);
  --radius: 6px;
  --transition: 0.2s ease;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--sans);
  background: var(--parchment);
  color: #2c2c28;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── LAYOUT ── */
.app { display: flex; min-height: 100vh; }

.sidebar {
  width: 260px;
  background: var(--ink);
  color: #fff;
  padding: 28px 0;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  transition: transform 0.3s ease;
}

.sidebar-brand {
  padding: 0 24px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  gap: 12px;
}

.sidebar-brand .brand-logo {
  width: 40px;
  height: auto;
  border-radius: 4px;
  background: #fff; /* In case the logo has transparency */
  padding: 2px;
}

.sidebar-brand .brand-text {
  display: flex;
  flex-direction: column;
}

.sidebar-brand h1 {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 15px;
  letter-spacing: 0.02em;
  line-height: 1.3;
  color: #fff;
}

.sidebar-brand .subtitle {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  margin-top: 6px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.sidebar-nav {
  flex: 1;
  padding: 16px 0;
  overflow-y: auto;
}

.nav-section-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.35);
  padding: 16px 24px 8px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 24px;
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  transition: all var(--transition);
  border-left: 3px solid transparent;
}

.nav-item:hover {
  background: rgba(255,255,255,0.06);
  color: #fff;
}

.nav-item.active {
  background: rgba(255,255,255,0.08);
  color: #fff;
  border-left-color: #fff;
}

.nav-item svg { width: 16px; height: 16px; opacity: 0.7; flex-shrink: 0; }
.nav-item.active svg { opacity: 1; }

.nav-badge {
  margin-left: auto;
  background: var(--red);
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
  font-variant-numeric: tabular-nums;
}

.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid rgba(255,255,255,0.1);
  font-size: 11px;
  color: rgba(255,255,255,0.35);
}

.main {
  flex: 1;
  margin-left: 260px;
  padding: 0;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  background: rgba(245,244,237,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--cream);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.topbar-title {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 18px;
  color: var(--ink);
}

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--card-bg);
  border: 1px solid var(--cream);
  border-radius: var(--radius);
  padding: 7px 14px;
  font-size: 13px;
  color: var(--olive);
  width: 280px;
  transition: border-color var(--transition);
}

.search-box:focus-within { border-color: var(--ink); }
.search-box svg { width: 14px; height: 14px; opacity: 0.4; flex-shrink: 0; }

.search-box input {
  border: none;
  background: none;
  outline: none;
  font-family: var(--sans);
  font-size: 13px;
  color: #2c2c28;
  width: 100%;
}

.filter-group {
  display: flex;
  gap: 8px;
  align-items: center;
}

.filter-select {
  font-family: var(--sans);
  font-size: 12px;
  padding: 7px 12px;
  border: 1px solid var(--cream);
  border-radius: var(--radius);
  background: var(--card-bg);
  color: #2c2c28;
  cursor: pointer;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236b6a5e' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 10px center;
  padding-right: 28px;
}

.filter-select:focus { border-color: var(--ink); }

.content { padding: 24px 32px 48px; }

/* ── PAGES ── */
.page { display: none; }
.page.active { display: block; }

/* ── KPI CARDS ── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 28px;
}

.kpi-card {
  background: var(--card-bg);
  border: 1px solid var(--cream);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow-card);
  transition: transform var(--transition), box-shadow var(--transition);
}

.kpi-card:hover {
  transform: translateY(-1px);
  box-shadow: var(--shadow-whisper);
}

.kpi-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--olive);
  margin-bottom: 8px;
}

.kpi-value {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 28px;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
}

.kpi-sub {
  font-size: 12px;
  color: var(--warm-gray);
  margin-top: 4px;
  font-variant-numeric: tabular-nums;
}

.kpi-card.alert { border-left: 3px solid var(--red); }
.kpi-card.alert .kpi-value { color: var(--red); }
.kpi-card.warn { border-left: 3px solid var(--amber); }
.kpi-card.warn .kpi-value { color: var(--amber); }
.kpi-card.good { border-left: 3px solid var(--green); }
.kpi-card.good .kpi-value { color: var(--green); }

/* ── SECTION HEADERS ── */
.section-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin: 28px 0 16px;
}

.section-num {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 13px;
  color: var(--ink);
  opacity: 0.5;
}

.section-title {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 20px;
  color: var(--ink);
}

.section-sub {
  font-size: 12px;
  color: var(--olive);
  margin-left: auto;
}

/* ── TABLES ── */
.table-wrap {
  background: var(--card-bg);
  border: 1px solid var(--cream);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-card);
}

.table-toolbar {
  padding: 12px 16px;
  border-bottom: 1px solid var(--cream);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

.table-toolbar-left {
  display: flex;
  gap: 8px;
  align-items: center;
}

.table-toolbar .count {
  font-size: 12px;
  color: var(--olive);
  font-variant-numeric: tabular-nums;
}

.table-scroll { overflow-x: auto; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

thead th {
  position: sticky;
  top: 0;
  background: var(--cream);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  font-size: 10px;
  color: var(--olive);
  padding: 10px 12px;
  text-align: left;
  white-space: nowrap;
  border-bottom: 1px solid #d8d7ce;
  cursor: pointer;
  user-select: none;
}

thead th:hover { color: var(--ink); }

thead th.sorted-asc::after { content: ' ▲'; font-size: 8px; }
thead th.sorted-desc::after { content: ' ▼'; font-size: 8px; }

tbody td {
  padding: 9px 12px;
  border-bottom: 1px solid #eeedea;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}

tbody tr:hover { background: rgba(27,54,93,0.02); }

.cell-num { text-align: right; font-variant-numeric: tabular-nums; }

/* ── TAGS / BADGES ── */
.tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.02em;
  white-space: nowrap;
}

.tag-green { background: #E8F5E9; color: var(--green); }
.tag-amber { background: #FFF8E1; color: var(--amber); }
.tag-red   { background: #FFEBEE; color: var(--red); }
.tag-blue  { background: var(--blue-tag); color: var(--ink); }
.tag-gray  { background: #ECEBE4; color: var(--olive); }

/* ── PROGRESS BAR ── */
.progress-bar {
  width: 80px;
  height: 6px;
  background: var(--cream);
  border-radius: 3px;
  overflow: hidden;
  display: inline-block;
  vertical-align: middle;
}

.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s ease;
}

.progress-fill.green { background: var(--green); }
.progress-fill.amber { background: var(--amber); }
.progress-fill.red   { background: var(--red); }
.progress-fill.blue  { background: var(--ink); }

/* ── CHARTS (CSS-only) ── */
.chart-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}

.chart-card {
  background: var(--card-bg);
  border: 1px solid var(--cream);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow-card);
}

.chart-card-title {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 14px;
  color: var(--ink);
  margin-bottom: 16px;
}

.bar-chart { display: flex; flex-direction: column; gap: 8px; }

.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.bar-label {
  width: 140px;
  font-size: 11px;
  color: var(--olive);
  text-align: right;
  flex-shrink: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.bar-track {
  flex: 1;
  height: 20px;
  background: var(--cream);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
  display: flex;
}

.bar-seg {
  height: 100%;
  transition: width 0.5s ease;
  position: relative;
}

.bar-seg.s-green { background: var(--green); }
.bar-seg.s-amber { background: var(--amber); }
.bar-seg.s-red   { background: #ccc; }

.bar-value {
  font-size: 11px;
  font-weight: 600;
  color: var(--olive);
  width: 50px;
  text-align: right;
  flex-shrink: 0;
  font-variant-numeric: tabular-nums;
}

/* ── DONUT CHART ── */
.donut-container {
  display: flex;
  align-items: center;
  gap: 24px;
}

.donut-svg { width: 140px; height: 140px; }

.donut-legend {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--olive);
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}

.legend-value {
  margin-left: auto;
  font-weight: 600;
  color: #2c2c28;
  font-variant-numeric: tabular-nums;
}

/* ── BUILDABILITY ── */
.build-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}

.build-card {
  background: var(--card-bg);
  border: 1px solid var(--cream);
  border-radius: var(--radius);
  padding: 16px 18px;
  box-shadow: var(--shadow-card);
  cursor: pointer;
  transition: all var(--transition);
}

.build-card:hover {
  border-color: var(--ink);
  box-shadow: var(--shadow-whisper);
}

.build-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.build-card-area {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 15px;
  color: var(--ink);
}

.build-pct {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 22px;
  font-variant-numeric: tabular-nums;
}

.build-bar {
  width: 100%;
  height: 8px;
  background: var(--cream);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 10px;
  display: flex;
}

.build-detail {
  display: flex;
  gap: 16px;
  font-size: 11px;
  color: var(--olive);
}

.build-detail span { font-variant-numeric: tabular-nums; }

/* ── WORKFORCE PANEL ── */
.workforce-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}

.workforce-card {
  background: var(--card-bg);
  border: 1px solid var(--cream);
  border-radius: var(--radius);
  padding: 18px 20px;
  box-shadow: var(--shadow-card);
}

.workforce-card-title {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 14px;
  color: var(--ink);
  margin-bottom: 6px;
}

.workforce-stat {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 10px;
}

.workforce-number {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 32px;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}

.workforce-unit {
  font-size: 13px;
  color: var(--olive);
}

.workforce-breakdown {
  font-size: 12px;
  color: var(--olive);
  line-height: 1.7;
}

/* ── PAGINATION ── */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin-top: 16px;
  font-size: 12px;
}

.page-btn {
  padding: 5px 10px;
  border: 1px solid var(--cream);
  border-radius: var(--radius);
  background: var(--card-bg);
  cursor: pointer;
  font-family: var(--sans);
  font-size: 12px;
  color: var(--olive);
  font-variant-numeric: tabular-nums;
  transition: all var(--transition);
}

.page-btn:hover { border-color: var(--ink); color: var(--ink); }
.page-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
.page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  z-index: 200;
  align-items: center;
  justify-content: center;
}

.modal-overlay.active { display: flex; }

.modal {
  background: var(--parchment);
  border-radius: 8px;
  width: 90%;
  max-width: 800px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  padding: 28px;
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.modal-title {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 18px;
  color: var(--ink);
}

.modal-close {
  width: 32px;
  height: 32px;
  border: 1px solid var(--cream);
  border-radius: var(--radius);
  background: var(--card-bg);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--olive);
  transition: all var(--transition);
}

.modal-close:hover { border-color: var(--ink); color: var(--ink); }

/* ── RESPONSIVE ── */
.mobile-toggle {
  display: none;
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 150;
  width: 36px;
  height: 36px;
  background: var(--ink);
  border: none;
  border-radius: var(--radius);
  color: #fff;
  cursor: pointer;
  align-items: center;
  justify-content: center;
}

@media (max-width: 900px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .mobile-toggle { display: flex; }
  .topbar { padding-left: 56px; }
  .chart-grid { grid-template-columns: 1fr; }
  .search-box { width: 180px; }
}

@media (max-width: 600px) {
  .content { padding: 16px; }
  .topbar-actions { display: none; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
}

/* ── ANIMATIONS ── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.animate-in { animation: fadeIn 0.3s ease both; }
</style>
</head>
<body>

<button class="mobile-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
</button>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img src="logo.png" alt="Timas Rekind" class="brand-logo">
      <div class="brand-text">
        <h1>Piping Material Monitoring</h1>
        <div class="subtitle">Salak Unit 7 — Piping</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <div class="nav-item active" data-page="overview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </div>

      <div class="nav-section-label">Analysis</div>
      <div class="nav-item" data-page="buildability">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        Buildability
        <span class="nav-badge" id="navBadgeBuild"></span>
      </div>
      <div class="nav-item" data-page="shortages">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Shortages
        <span class="nav-badge" id="navBadgeShort"></span>
      </div>

      <div class="nav-section-label">Supply Chain</div>
      <div class="nav-item" data-page="supply">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        In Supply
      </div>
      <div class="nav-item" data-page="inventory">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        On-Site Inventory
      </div>

      <div class="nav-section-label">Planning</div>
      <div class="nav-item" data-page="workforce">

<script>
// ════════════════════════════════════════════
// DATA — embedded from Monitoring-Pi-Matl.
// Fields: [area,package,bomTitle,identCode,partName,desc,lSize,qtyReq,unit,poNo,vendor,statusPO,mfgPct,eta,ata,pctDelv,qtySite,shortage,statusMtl]
// ════════════════════════════════════════════
const FIELDS = ['area','package','bomTitle','identCode','partName','desc','lSize','qtyReq','unit','poNo','vendor','statusPO','mfgPct','eta','ata','pctDelv','qtySite','shortage','statusMtl'];

const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwL58Ard32rBhgYrQNcSk3ks6MLkMfnVh8nKLlNOZkmS8f19tG3oH7d0kV74XJn2ho_/exec";
let RAW_DATA = [];

function loadData() {
  const COL_MAP = {
    'area': 1,
    'package': 2,
    'bomTitle': 5,
    'identCode': 7,
    'partName': 8,
    'desc': 9,
    'lSize': 10,
    'qtyReq': 12,
    'unit': 13,
    'poNo': 15,
    'vendor': 17,
    'statusPO': 20,
    'mfgPct': 25,
    'eta': 30,
    'ata': 31,
    'pctDelv': 32,
    'qtySite': 34,
    'shortage': 35,
    'statusMtl': 42
  };

  // Convert full Google Sheet rows (43 columns) to objects
  // Filter out any header rows or empty rows
  return RAW_DATA.filter(r => {
    // Basic valid row check (has a valid "No" column or "Area" column)
    if (typeof r[0] !== 'number' || !r[1]) return false;
    
    // Ignore "Grand Total" or empty Area rows that might be at the bottom
    const areaVal = String(r[1]).trim().toLowerCase();
    if (areaVal === 'grand total' || areaVal === '') return false;
    
    return true;
  }).map(r => {
    const obj = {};
    FIELDS.forEach(f => {
      let val = r[COL_MAP[f]];
      
      // Force numeric conversions for math operations
      if (['qtyReq', 'qtySite', 'shortage'].includes(f)) {
        val = Number(val) || 0;
      }
      
      // Convert decimal percentages (e.g. 1) back to 100 for the dashboard UI
      if (['mfgPct', 'pctDelv'].includes(f)) {
        val = (Number(val) || 0) * 100;
      }
      
      // Handle Date formatting from Google Sheet ISO strings
      if (['eta', 'ata'].includes(f) && val) {
        if (typeof val === 'string' && val.includes('T')) {
          val = val.split('T')[0];
        }
      }
      
      obj[f] = val;
    });
    
    // Logic: If required qty is 0, treat it as "On Site" so it doesn't stay pending
    if (obj.qtyReq === 0) {
      obj.statusMtl = 'On Site';
    }
    
    return obj;
  });
}

let ALL_DATA = [];
let filteredData = [];

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', async () => {
  try {
    // Show loading
    const el = document.getElementById('page-overview');
    if (el) el.innerHTML = '<h3 style="padding:2rem;">Loading live data from Google Sheets...</h3>';

    const response = await fetch(APP_SCRIPT_URL);
    const data = await response.json();
    
    if (data.error) {
      console.error(data.error);
      alert('Error loading data: ' + data.error);
      return;
    }
    
    RAW_DATA = data;
    ALL_DATA = loadData();
    filteredData = [...ALL_DATA];
    populateFilters();
    renderOverview();
    setupNav();
  } catch (error) {
    console.error('Error fetching data:', error);
    alert('Failed to load data. Ensure your Apps Script is deployed.');
  }
});

function populateFilters() {
  const areas = [...new Set(ALL_DATA.map(d => d.area))].sort();
  const pkgs = [...new Set(ALL_DATA.map(d => d.package))].sort();
  const areaSelect = document.getElementById('filterArea');
  const pkgSelect = document.getElementById('filterPackage');
  areas.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; areaSelect.appendChild(o); });
  pkgs.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p; pkgSelect.appendChild(o); });
}

function applyFilters() {
  const area = document.getElementById('filterArea').value;
  const pkg = document.getElementById('filterPackage').value;
  const status = document.getElementById('filterStatus').value;
  const search = document.getElementById('globalSearch').value.toLowerCase();

  filteredData = ALL_DATA.filter(d => {
    if (area && d.area !== area) return false;
    if (pkg && d.package !== pkg) return false;
    if (status && d.statusMtl !== status) return false;
    if (search) {
      const hay = [d.identCode, d.partName, d.desc, d.poNo, d.vendor, d.area, d.package].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  const activePage = document.querySelector('.nav-item.active')?.dataset?.page || 'overview';
  renderPage(activePage);
}

function handleSearch() { applyFilters(); }

// ════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════
function setupNav() {
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      item.classList.add('active');
      const page = item.dataset.page;
      renderPage(page);
      document.querySelector('.sidebar').classList.remove('open');
    });
  });
  // Set badge counts
  const shortages = ALL_DATA.filter(d => d.shortage < 0).length;
  document.getElementById('navBadgeShort').textContent = shortages;
  const waitingPO = ALL_DATA.filter(d => d.statusPO === 'WAITING PO').length;
  document.getElementById('navBadgeBuild').textContent = waitingPO;
}

const PAGE_TITLES = {
  overview: 'Dashboard',
  buildability: 'Buildability Analysis',
  shortages: 'Shortage Alerts',
  supply: 'In Supply — Material Flow',
  inventory: 'On-Site Inventory',
  workforce: 'Workforce Planning',
  all: 'All Material Items'
};

function renderPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('page-' + page);
  if (el) el.classList.add('active');
  document.getElementById('pageTitle').textContent = PAGE_TITLES[page] || 'Dashboard';

  switch(page) {
    case 'overview': renderOverview(); break;
    case 'buildability': renderBuildability(); break;
    case 'shortages': renderShortages(); break;
    case 'supply': renderSupply(); break;
    case 'inventory': renderInventory(); break;
    case 'workforce': renderWorkforce(); break;
    case 'all': renderAllItems(); break;
  }
}

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
function fmt(n) { return n.toLocaleString('en-US'); }
function pct(a, b) { return b > 0 ? Math.round(a/b*100) : 0; }
function statusTag(s) {
  if (s === 'On Site') return '<span class="tag tag-green">On Site</span>';
  if (s === 'Partial Delv.') return '<span class="tag tag-amber">Partial</span>';
  return '<span class="tag tag-gray">Pending</span>';
}
function poTag(s) {
  if (s === 'PO DONE') return '<span class="tag tag-blue">PO Done</span>';
  return '<span class="tag tag-red">Waiting PO</span>';
}
function progressBar(pctVal, color) {
  return `<span class="progress-bar"><span class="progress-fill ${color}" style="width:${Math.min(pctVal,100)}%"></span></span> <span style="font-size:11px;color:var(--olive)">${pctVal}%</span>`;
}

function makeDonut(segments, size=140) {
  const total = segments.reduce((s,x) => s+x.value, 0);
  if (total === 0) return '';
  const r = 50, cx = 60, cy = 60, sw = 18;
  const circ = 2 * Math.PI * r;
  let offset = 0;
  let paths = '';
  segments.forEach(seg => {
    const pct = seg.value / total;
    const dash = circ * pct;
    const gap = circ - dash;
    paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${seg.color}" stroke-width="${sw}" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset += dash;
  });
  const centerPct = segments[0] ? Math.round(segments[0].value/total*100) : 0;
  return `<svg class="donut-svg" viewBox="0 0 120 120" width="${size}" height="${size}">${paths}<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central" font-family="var(--serif)" font-weight="500" font-size="18" fill="var(--ink)">${centerPct}%</text></svg>`;
}

// ════════════════════════════════════════════
// PAGE: OVERVIEW
// ════════════════════════════════════════════
function renderOverview() {
  const data = filteredData;
  const total = data.length;
  const onSite = data.filter(d => d.statusMtl === 'On Site').length;
  const partial = data.filter(d => d.statusMtl === 'Partial Delv.').length;
  const pending = total - onSite - partial;
  const shortageItems = data.filter(d => d.shortage < 0);
  const waitingPO = data.filter(d => d.statusPO === 'WAITING PO').length;
  const totalQty = data.reduce((s,d) => s + d.qtyReq, 0);
  const totalOnSiteQty = data.reduce((s,d) => s + d.qtySite, 0);
  const availPct = pct(totalOnSiteQty, totalQty);

  // Area breakdown
  const areas = [...new Set(data.map(d => d.area))].sort();
  const areaSummary = areas.map(a => {
    const items = data.filter(d => d.area === a);
    const os = items.filter(d => d.statusMtl === 'On Site').length;
    const pa = items.filter(d => d.statusMtl === 'Partial Delv.').length;
    return { area: a, total: items.length, onSite: os, partial: pa, pending: items.length - os - pa };
  });

  // Package breakdown
  const pkgs = [...new Set(data.map(d => d.package))].sort();
  const pkgSummary = pkgs.map(p => {
    const items = data.filter(d => d.package === p);
    const os = items.filter(d => d.statusMtl === 'On Site').length;
    const tq = items.reduce((s,d) => s+d.qtyReq, 0);
    const tsq = items.reduce((s,d) => s+d.qtySite, 0);
    return { pkg: p, total: items.length, onSite: os, qtyReq: tq, qtySite: tsq, pct: pct(tsq,tq) };
  }).sort((a,b) => a.pct - b.pct);

  const el = document.getElementById('page-overview');
  el.innerHTML = `
    <div class="kpi-grid animate-in">
      <div class="kpi-card">
        <div class="kpi-label">Total Line Items</div>
        <div class="kpi-value">${fmt(total)}</div>
        <div class="kpi-sub">${fmt(pkgs.length)} packages across ${areas.length} areas</div>
      </div>
      <div class="kpi-card good">
        <div class="kpi-label">On Site</div>
        <div class="kpi-value">${fmt(onSite)}</div>
        <div class="kpi-sub">${pct(onSite,total)}% of line items</div>
      </div>
      <div class="kpi-card warn">
        <div class="kpi-label">Partial Delivery</div>
        <div class="kpi-value">${fmt(partial)}</div>
        <div class="kpi-sub">${pct(partial,total)}% — in transit</div>
      </div>
      <div class="kpi-card alert">
        <div class="kpi-label">Shortage Items</div>
        <div class="kpi-value">${fmt(shortageItems.length)}</div>
        <div class="kpi-sub">${fmt(waitingPO)} still waiting PO</div>
      </div>
      <div class="kpi-card ${availPct >= 60 ? 'good' : availPct >= 30 ? 'warn' : 'alert'}">
        <div class="kpi-label">Qty Availability</div>
        <div class="kpi-value">${availPct}%</div>
        <div class="kpi-sub">${fmt(Math.round(totalOnSiteQty))} of ${fmt(Math.round(totalQty))}</div>
      </div>
    </div>

    <div class="chart-grid animate-in" style="animation-delay:0.1s">
      <div class="chart-card">
        <div class="chart-card-title">Material Status Distribution</div>
        <div class="donut-container">
          ${makeDonut([
            {value: onSite, color: '#2d6a4f', label: 'On Site'},
            {value: partial, color: '#a06b1b', label: 'Partial'},
            {value: pending, color: '#ccc', label: 'Pending'}
          ])}
          <div class="donut-legend">
            <div class="legend-item"><div class="legend-dot" style="background:#2d6a4f"></div> On Site <span class="legend-value">${fmt(onSite)}</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:#a06b1b"></div> Partial <span class="legend-value">${fmt(partial)}</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:#ccc"></div> Pending <span class="legend-value">${fmt(pending)}</span></div>
          </div>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">PO Status</div>
        <div class="donut-container">
          ${makeDonut([
            {value: total - waitingPO, color: 'var(--ink)', label: 'PO Done'},
            {value: waitingPO, color: '#b33a3a', label: 'Waiting PO'}
          ])}
          <div class="donut-legend">
            <div class="legend-item"><div class="legend-dot" style="background:var(--ink)"></div> PO Done <span class="legend-value">${fmt(total - waitingPO)}</span></div>
            <div class="legend-item"><div class="legend-dot" style="background:#b33a3a"></div> Waiting PO <span class="legend-value">${fmt(waitingPO)}</span></div>
          </div>
        </div>
      </div>
    </div>

    <div class="section-header animate-in" style="animation-delay:0.15s">
      <span class="section-num">01</span>
      <span class="section-title">Material Availability by Area</span>
    </div>
    <div class="chart-card animate-in" style="animation-delay:0.2s">
      <div class="bar-chart">
        ${areaSummary.map(a => `
          <div class="bar-row">
            <div class="bar-label">${a.area}</div>
            <div class="bar-track">
              <div class="bar-seg s-green" style="width:${pct(a.onSite,a.total)}%"></div>
              <div class="bar-seg s-amber" style="width:${pct(a.partial,a.total)}%"></div>
            </div>
            <div class="bar-value">${pct(a.onSite+a.partial,a.total)}%</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="section-header animate-in" style="animation-delay:0.25s">
      <span class="section-num">02</span>
      <span class="section-title">Package Readiness</span>
      <span class="section-sub">sorted by availability (lowest first)</span>
    </div>
    <div class="table-wrap animate-in" style="animation-delay:0.3s">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Package</th>
              <th>Items</th>
              <th>On Site</th>
              <th>Qty Required</th>
              <th>Qty On Site</th>
              <th>Availability</th>
            </tr>
          </thead>
          <tbody>
            ${pkgSummary.map(p => `
              <tr>
                <td><span class="tag tag-blue">${p.pkg}</span></td>
                <td class="cell-num">${p.total}</td>
                <td class="cell-num">${p.onSite}</td>
                <td class="cell-num">${fmt(Math.round(p.qtyReq))}</td>
                <td class="cell-num">${fmt(Math.round(p.qtySite))}</td>
                <td>${progressBar(p.pct, p.pct >= 60 ? 'green' : p.pct >= 30 ? 'amber' : 'red')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ════════════════════════════════════════════
// PAGE: BUILDABILITY
// ════════════════════════════════════════════
function renderBuildability() {
  const data = filteredData;
  // Group by BOM — what can be built with current stock?
  const bomGroups = {};
  data.forEach(d => {
    const key = d.bomTitle || d.bomNo || 'Unknown';
    if (!bomGroups[key]) bomGroups[key] = { title: key, area: d.area, items: [], totalParts: 0, available: 0, partial: 0, missing: 0, totalQtyReq: 0, totalQtySite: 0 };
    
    bomGroups[key].items.push(d);
    
    // Ignore items with 0 required quantity for buildability calculations
    if (d.qtyReq > 0) {
      bomGroups[key].totalParts++;
      bomGroups[key].totalQtyReq += d.qtyReq;
      // Use capped qtySite to prevent surplus from artificially inflating progress
      bomGroups[key].totalQtySite += Math.min(d.qtySite, d.qtyReq);
      
      if (d.qtySite >= d.qtyReq) bomGroups[key].available++;
      else if (d.qtySite > 0) bomGroups[key].partial++;
      else bomGroups[key].missing++;
    }
  });

  const boms = Object.values(bomGroups).map(b => {
    // Buildability is now based on QTY percentage, not line item count
    b.buildPct = b.totalQtyReq > 0 ? Math.round((b.totalQtySite / b.totalQtyReq) * 100) : 100;
    b.buildable = b.buildPct === 100;
    return b;
  }).sort((a,b) => b.buildPct - a.buildPct);

  const fullyBuildable = boms.filter(b => b.buildable).length;
  const partialBuild = boms.filter(b => b.buildPct > 0 && !b.buildable).length;
  const notBuildable = boms.filter(b => b.buildPct === 0).length;

  // Group by area for buildability cards
  const areaBuilds = {};
  boms.forEach(b => {
    if (!areaBuilds[b.area]) areaBuilds[b.area] = { buildable: 0, partial: 0, blocked: 0, total: 0 };
    areaBuilds[b.area].total++;
    if (b.buildable) areaBuilds[b.area].buildable++;
    else if (b.buildPct > 0) areaBuilds[b.area].partial++;
    else areaBuilds[b.area].blocked++;
  });

  const el = document.getElementById('page-buildability');
  el.innerHTML = `
    <div class="kpi-grid animate-in">
      <div class="kpi-card good">
        <div class="kpi-label">Fully Buildable BOMs</div>
        <div class="kpi-value">${fullyBuildable}</div>
        <div class="kpi-sub">All parts on site — ready to build</div>
      </div>
      <div class="kpi-card warn">
        <div class="kpi-label">Partially Ready</div>
        <div class="kpi-value">${partialBuild}</div>
        <div class="kpi-sub">Some parts available</div>
      </div>
      <div class="kpi-card alert">
        <div class="kpi-label">Blocked — No Material</div>
        <div class="kpi-value">${notBuildable}</div>
        <div class="kpi-sub">Zero parts on site</div>
      </div>
    </div>

    <div class="section-header animate-in" style="animation-delay:0.1s">
      <span class="section-num">01</span>
      <span class="section-title">Buildability by Area</span>
      <span class="section-sub">What can be built with current stock?</span>
    </div>
    <div class="build-grid animate-in" style="animation-delay:0.15s">
      ${Object.entries(areaBuilds).map(([area, ab]) => {
        const totalB = ab.total;
        const bp = pct(ab.buildable, totalB);
        const pp = pct(ab.partial, totalB);
        return `
        <div class="build-card" onclick="showAreaBuildDetail('${area}')">
          <div class="build-card-header">
            <div class="build-card-area">${area}</div>
            <div class="build-pct" style="color:${bp >= 50 ? 'var(--green)' : bp > 0 ? 'var(--amber)' : 'var(--red)'}">${bp}%</div>
          </div>
          <div class="build-bar">
            <div class="bar-seg s-green" style="width:${bp}%"></div>
            <div class="bar-seg s-amber" style="width:${pp}%"></div>
          </div>
          <div class="build-detail">
            <span style="color:var(--green)">${ab.buildable} ready</span>
            <span style="color:var(--amber)">${ab.partial} partial</span>
            <span style="color:var(--red)">${ab.blocked} blocked</span>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="section-header animate-in" style="animation-delay:0.2s">
      <span class="section-num">02</span>
      <span class="section-title">BOM Buildability Detail</span>
      <span class="section-sub">${boms.length} BOMs analyzed</span>
    </div>
    <div class="table-wrap animate-in" style="animation-delay:0.25s">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>BOM Title</th>
              <th>Area</th>
              <th>Parts</th>
              <th>Available</th>
              <th>Partial</th>
              <th>Missing</th>
              <th>Buildability</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            ${boms.slice(0, 60).map(b => `
              <tr style="cursor:pointer" onclick="showBomDetail('${b.title.replace(/'/g,"\\'")}')">

function renderSupply() {
  const data = filteredData;

  const inSupply = data.filter(d => d.statusPO === 'PO DONE' && d.statusMtl !== 'On Site');
  const partialDelv = data.filter(d => d.statusMtl === 'Partial Delv.');
  const mfgInProgress = inSupply.filter(d => d.mfgPct > 0 && d.mfgPct < 100);
  const mfgComplete = inSupply.filter(d => d.mfgPct >= 100);
  const shipped = inSupply.filter(d => d.pctDelv > 0);

  // Group by vendor for supply tracking
  const vendorSupply = {};
  inSupply.forEach(d => {
    const v = d.vendor || 'Unknown';
    if (!vendorSupply[v]) vendorSupply[v] = { items: 0, totalQty: 0, mfgDone: 0, shipped: 0 };
    vendorSupply[v].items++;

        <div class="kpi-label">Shipped / In Transit</div>
        <div class="kpi-value">${fmt(shipped.length)}</div>
        <div class="kpi-sub">on the way to site</div>
      </div>
    </div>

    <div class="section-header animate-in" style="animation-delay:0.1s">
      <span class="section-num">01</span>
      <span class="section-title">Vendor Supply Status</span>
      <span class="section-sub">Track vendor delivery performance</span>
    </div>
    <div class="table-wrap animate-in" style="animation-delay:0.15s">
      <div class="table-scroll">
        <table>

          <tbody>
            ${vendorList.map(([v, vs]) => `
              <tr>
                <td style="font-weight:500">${v}</td>
                <td class="cell-num">${vs.items}</td>
                <td class="cell-num">${fmt(Math.round(vs.totalQty))}</td>
                <td class="cell-num">${vs.mfgDone}</td>

// ════════════════════════════════════════════
// PAGE: WORKFORCE
// ════════════════════════════════════════════
function renderWorkforce() {
  const data = filteredData;

  // Estimate workforce needs based on incoming material
  // Assumptions for piping installation rates:
  const RATES = {
    'PIPE': { unit: 'M', ratePerManday: 12, desc: '12m pipe/man-day' },
    '90 ELBOW': { unit: 'EA', ratePerManday: 8, desc: '8 fittings/man-day' },
    '45 ELBOW': { unit: 'EA', ratePerManday: 8, desc: '8 fittings/man-day' },
    'TEE': { unit: 'EA', ratePerManday: 6, desc: '6 fittings/man-day' },
    'RED. TEE': { unit: 'EA', ratePerManday: 6, desc: '6 fittings/man-day' },
    'FLANGE': { unit: 'EA', ratePerManday: 10, desc: '10 flanges/man-day' },
    'GATE VALVE': { unit: 'EA', ratePerManday: 3, desc: '3 valves/man-day' },
    'GLOBE VALVE': { unit: 'EA', ratePerManday: 3, desc: '3 valves/man-day' },
    'CHECK VALVE': { unit: 'EA', ratePerManday: 3, desc: '3 valves/man-day' },
    'BUTTERFLY VALVE': { unit: 'EA', ratePerManday: 4, desc: '4 valves/man-day' },
    'STUD BOLT&NUTS': { unit: 'SET', ratePerManday: 40, desc: '40 sets/man-day' },
    'GASKET': { unit: 'EA', ratePerManday: 20, desc: '20 gaskets/man-day' },
    'WELDOLET': { unit: 'EA', ratePerManday: 6, desc: '6 pcs/man-day' },
    'SOCKOLET': { unit: 'EA', ratePerManday: 6, desc: '6 pcs/man-day' },
    'CON. RED': { unit: 'EA', ratePerManday: 8, desc: '8 reducers/man-day' },
    'ECC. RED': { unit: 'EA', ratePerManday: 8, desc: '8 reducers/man-day' },
    'CAP': { unit: 'EA', ratePerManday: 10, desc: '10 caps/man-day' },
    'BLIND FLANGE': { unit: 'EA', ratePerManday: 10, desc: '10 flanges/man-day' },
  };
  const DEFAULT_RATE = { ratePerManday: 8, desc: '8 pcs/man-day' };

  // Calculate mandays for on-site material
  const onSiteItems = data.filter(d => d.qtySite > 0);
  let totalMandaysOnSite = 0;
  const areaMandays = {};

  onSiteItems.forEach(d => {
    const rate = RATES[d.partName] || DEFAULT_RATE;
    const mandays = d.qtySite / rate.ratePerManday;
    totalMandaysOnSite += mandays;
    if (!areaMandays[d.area]) areaMandays[d.area] = { onSite: 0, incoming: 0 };
    areaMandays[d.area].onSite += mandays;
  });

  // Calculate mandays for incoming material (in supply)
  const incomingItems = data.filter(d => d.statusPO === 'PO DONE' && d.statusMtl !== 'On Site' && d.shortage < 0);
  let totalMandaysIncoming = 0;
  incomingItems.forEach(d => {
    const rate = RATES[d.partName] || DEFAULT_RATE;
    const mandays = Math.abs(d.shortage) / rate.ratePerManday;
    totalMandaysIncoming += mandays;
    if (!areaMandays[d.area]) areaMandays[d.area] = { onSite: 0, incoming: 0 };
    areaMandays[d.area].incoming += mandays;
  });

  // Crew estimation: assume 22 working days/month
  const WORK_DAYS = 22;
  const crewOnSite = Math.ceil(totalMandaysOnSite / WORK_DAYS);
  const crewIncoming = Math.ceil(totalMandaysIncoming / WORK_DAYS);

  const el = document.getElementById('page-workforce');
  el.innerHTML = `
    <div style="background:var(--amber-bg);border:1px solid #e8d5a8;border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;font-size:13px;color:var(--amber);line-height:1.6" class="animate-in">
      Workforce estimates are based on standard piping installation rates. Adjust rates based on actual subcontractor productivity for more accurate planning. These numbers help determine minimum crew mobilization for incoming material batches.
    </div>

    <div class="kpi-grid animate-in" style="animation-delay:0.05s">
      <div class="kpi-card good">
        <div class="kpi-label">Man-Days (On-Site Stock)</div>
        <div class="kpi-value">${fmt(Math.round(totalMandaysOnSite))}</div>
        <div class="kpi-sub">work available now</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Crew for 1-Month Install</div>
        <div class="kpi-value">${crewOnSite}</div>
        <div class="kpi-sub">fitters needed (22 days/mo)</div>
      </div>
      <div class="kpi-card warn">
        <div class="kpi-label">Man-Days (Incoming)</div>
        <div class="kpi-value">${fmt(Math.round(totalMandaysIncoming))}</div>
        <div class="kpi-sub">work when material arrives</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Crew for Incoming</div>
        <div class="kpi-value">${crewIncoming}</div>
        <div class="kpi-sub">mobilize when delivered</div>
      </div>
    </div>

    <div class="section-header animate-in" style="animation-delay:0.1s">
      <span class="section-num">01</span>
      <span class="section-title">Workforce Need by Area</span>
    </div>
    <div class="workforce-grid animate-in" style="animation-delay:0.15s">
      ${Object.entries(areaMandays).sort((a,b) => (b[1].onSite+b[1].incoming) - (a[1].onSite+a[1].incoming)).map(([area, md]) => `
        <div class="workforce-card">
          <div class="workforce-card-title">${area}</div>
          <div class="workforce-stat">
            <span class="workforce-number">${Math.round(md.onSite + md.incoming)}</span>
            <span class="workforce-unit">total man-days</span>
          </div>
          <div class="workforce-breakdown">
            On-site stock: ${Math.round(md.onSite)} man-days (${Math.ceil(md.onSite/WORK_DAYS)} crew/mo)<br>
            Incoming material: ${Math.round(md.incoming)} man-days (${Math.ceil(md.incoming/WORK_DAYS)} crew/mo)
          </div>
        </div>
      `).join('')}
    </div>

    <div class="section-header animate-in" style="animation-delay:0.2s">
      <span class="section-num">02</span>
      <span class="section-title">Installation Rates Reference</span>
    </div>
    <div class="table-wrap animate-in" style="animation-delay:0.25s">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Part Type</th>
              <th>Rate per Man-Day</th>
              <th>On-Site Qty</th>
              <th>Est. Man-Days</th>
            </tr>
          </thead>
          <tbody>
            ${Object.entries(RATES).map(([part, rate]) => {
              const items = onSiteItems.filter(d => d.partName === part);
              const totalQty = items.reduce((s,d) => s+d.qtySite, 0);
              const mandays = totalQty / rate.ratePerManday;
              if (totalQty === 0) return '';
              return `
              <tr>
                <td>${part}</td>
                <td>${rate.desc}</td>
                <td class="cell-num">${fmt(Math.round(totalQty))}</td>
                <td class="cell-num" style="font-weight:600">${Math.round(mandays)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ════════════════════════════════════════════
// PAGE: ALL ITEMS
// ════════════════════════════════════════════
let allItemsPage = 1;
const ITEMS_PER_PAGE = 50;
let allItemsSort = { col: null, dir: 'asc' };

function renderAllItems() {
  const data = filteredData;
  const totalPages = Math.ceil(data.length / ITEMS_PER_PAGE);
  if (allItemsPage > totalPages) allItemsPage = 1;
  const start = (allItemsPage - 1) * ITEMS_PER_PAGE;
  const pageData = data.slice(start, start + ITEMS_PER_PAGE);

  const el = document.getElementById('page-all');
  el.innerHTML = `
    <div class="table-wrap animate-in">
      <div class="table-toolbar">
        <div class="table-toolbar-left">
          <span class="count">${fmt(data.length)} items</span>
        </div>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Area</th>
              <th>Package</th>
              <th>Part Name</th>
              <th>Size</th>
              <th>Description</th>
              <th>Qty Req</th>
              <th>On Site</th>
              <th>Shortage</th>
              <th>Unit</th>
              <th>PO</th>
              <th>Vendor</th>
              <th>PO Status</th>
              <th>Mfg %</th>
              <th>ETA</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            ${pageData.map(d => `
              <tr>
                <td><span class="tag tag-blue">${d.area}</span></td>
                <td style="font-size:11px">${d.package}</td>
                <td>${d.partName}</td>
                <td class="cell-num">${d.lSize}"</td>
                <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis" title="${d.desc}">${d.desc}</td>
                <td class="cell-num">${fmt(d.qtyReq)}</td>
                <td class="cell-num">${fmt(d.qtySite)}</td>
                <td class="cell-num" style="color:${d.shortage < 0 ? 'var(--red)' : 'var(--green)'};font-weight:${d.shortage < 0 ? '600' : '400'}">${fmt(d.shortage)}</td>
                <td>${d.unit}</td>
                <td style="font-size:11px">${d.poNo}</td>
                <td style="font-size:11px">${d.vendor || '—'}</td>
                <td>${poTag(d.statusPO)}</td>
                <td>${progressBar(d.mfgPct, d.mfgPct >= 100 ? 'green' : 'amber')}</td>
                <td style="font-size:11px">${d.eta || '—'}</td>
                <td>${statusTag(d.statusMtl)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <div class="pagination">
      <button class="page-btn" ${allItemsPage <= 1 ? 'disabled' : ''} onclick="allItemsPage=1;renderAllItems()">First</button>
      <button class="page-btn" ${allItemsPage <= 1 ? 'disabled' : ''} onclick="allItemsPage--;renderAllItems()">Prev</button>
      ${Array.from({length: Math.min(7, totalPages)}, (_, i) => {
        let p;
        if (totalPages <= 7) p = i + 1;
        else if (allItemsPage <= 4) p = i + 1;
        else if (allItemsPage >= totalPages - 3) p = totalPages - 6 + i;
        else p = allItemsPage - 3 + i;
        return `<button class="page-btn ${p === allItemsPage ? 'active' : ''}" onclick="allItemsPage=${p};renderAllItems()">${p}</button>`;
      }).join('')}
      <button class="page-btn" ${allItemsPage >= totalPages ? 'disabled' : ''} onclick="allItemsPage++;renderAllItems()">Next</button>
      <button class="page-btn" ${allItemsPage >= totalPages ? 'disabled' : ''} onclick="allItemsPage=${totalPages};renderAllItems()">Last</button>
    </div>
  `;
}

// ════════════════════════════════════════════
// MODALS
// ════════════════════════════════════════════
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

function showBomDetail(bomTitle) {
  const items = filteredData.filter(d => (d.bomTitle || d.bomNo) === bomTitle);
  const available = items.filter(d => d.qtySite >= d.qtyReq && d.qtyReq > 0).length;

  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-title">${bomTitle}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div style="margin-bottom:16px">
      <span class="tag ${available === items.length ? 'tag-green' : 'tag-red'}">${available === items.length ? 'FULLY BUILDABLE' : `${available}/${items.length} parts available`}</span>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr><th>Part</th><th>Size</th><th>Description</th><th>Qty Req</th><th>On Site</th><th>Shortage</th><th>PO</th><th>Status</th></tr>
        </thead>
        <tbody>
          ${items.map(d => `
            <tr>
              <td>${d.partName}</td>
              <td class="cell-num">${d.lSize}"</td>
              <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis">${d.desc}</td>
              <td class="cell-num">${fmt(d.qtyReq)}</td>
              <td class="cell-num">${fmt(d.qtySite)}</td>
              <td class="cell-num" style="color:${d.shortage < 0 ? 'var(--red)' : 'var(--green)'}">${fmt(d.shortage)}</td>
              <td style="font-size:11px">${d.poNo}</td>
              <td>${statusTag(d.statusMtl)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('active');
}

function showAreaBuildDetail(area) {
  const items = filteredData.filter(d => d.area === area);
  const boms = {};
  items.forEach(d => {
    const key = d.bomTitle || 'Unknown';
    if (!boms[key]) boms[key] = { total: 0, available: 0 };
    boms[key].total++;
    if (d.qtySite >= d.qtyReq && d.qtyReq > 0) boms[key].available++;
  });

  const bomList = Object.entries(boms).sort((a,b) => (b[1].available/b[1].total) - (a[1].available/a[1].total));

  const modal = document.getElementById('modalContent');
  modal.innerHTML = `
    <div class="modal-header">
      <div class="modal-title">${area} — Buildability</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr><th>BOM</th><th>Parts</th><th>Available</th><th>Buildability</th><th>Status</th></tr>
        </thead>
        <tbody>
          ${bomList.map(([title, b]) => {
            const bp = pct(b.available, b.total);
            return `
            <tr style="cursor:pointer" onclick="closeModal();setTimeout(()=>showBomDetail('${title.replace(/'/g,"\\'")}'),200)">
              <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis">${title}</td>
              <td class="cell-num">${b.total}</td>
              <td class="cell-num">${b.available}</td>
              <td>${progressBar(bp, bp >= 80 ? 'green' : bp >= 40 ? 'amber' : 'red')}</td>
              <td>${b.available === b.total ? '<span class="tag tag-green">READY</span>' : '<span class="tag tag-red">BLOCKED</span>'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('active');
}
</script>

</body>
